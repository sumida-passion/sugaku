<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仮説ラビット</title>
<style>
:root{
--bg1:#fff8df;--bg2:#e9f7ff;--ink:#2b251f;--orange:#ff8b3d;
--green:#21a67a;--card:#fffefa;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--ink);
}
.wrap{
max-width:1200px;
margin:auto;
padding:16px;
}
.card{
background:white;
border-radius:24px;
padding:18px;
margin-bottom:16px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}
h1{
font-size:48px;
margin:0 0 10px;
}
.subtitle{
font-size:20px;
font-weight:900;
line-height:1.6;
}
.problem{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:16px;
}
.box{
background:#fff7dc;
border:3px solid #f0c069;
border-radius:20px;
padding:20px;
text-align:center;
font-size:32px;
font-weight:900;
}
button{
border:0;
border-radius:18px;
padding:14px 18px;
font-size:18px;
font-weight:900;
cursor:pointer;
background:linear-gradient(#ffbd58,#ff8b3d);
color:white;
box-shadow:0 5px 0 #d37a33;
}
.choice-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:14px;
}
.choice{
background:white;
color:#222;
box-shadow:none;
border:3px solid #ddd;
}
.choice.selected{
border-color:#ff8b3d;
background:#fff1d8;
}
.result{
margin-top:14px;
font-size:18px;
line-height:1.7;
font-weight:800;
}
.good{
background:#eafff5;
border:2px solid #90e5bf;
padding:12px;
border-radius:16px;
margin-top:10px;
}
.bad{
background:#fff0f0;
border:2px solid #ffb0b0;
padding:12px;
border-radius:16px;
margin-top:10px;
}
.flow{
display:none;
}
.flow.active{
display:block;
}
.step{
background:#fffaf1;
border-radius:20px;
padding:18px;
margin-top:12px;
font-size:28px;
font-weight:900;
line-height:1.8;
text-align:center;
}
.arrow-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:18px;
}
.arrow-card{
background:#f8fbff;
border:3px dashed #7aa8dd;
border-radius:20px;
padding:16px;
font-size:24px;
font-weight:900;
line-height:1.7;
}
.rabbit{
width:220px;
display:block;
margin:auto;
}
.small{
font-size:18px;
}
.highlight{
color:#ff6a00;
}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<h1>仮説ラビット</h1>
<div class="subtitle">
共通点を見つける<br>
↓<br>
「なんか使えそう」を最後の答えまでつなげる
</div>

<div class="problem">
<div class="box">33 × 37</div>
<div class="box">42 × 48</div>
<div class="box">76 × 74</div>
</div>
</div>

<div class="card">
<h2>3つに共通するものは？</h2>

<div class="choice-grid" id="choices"></div>

<button onclick="check()">検証する</button>

<div id="result" class="result"></div>

<div id="nextArea"></div>
</div>

<div id="flow" class="card flow">
<img class="rabbit" src="images/rabbit44.png" onerror="this.style.display='none'">

<div id="stepArea"></div>

<div style="margin-top:18px;text-align:center">
<button onclick="nextStep()">次へ</button>
</div>
</div>

</div>

<script>
const data = [
{
id:"ones10",
text:"1けたの数字を足すと10",
good:true,
rows:[
["33×37","3+7=10","○"],
["42×48","2+8=10","○"],
["76×74","6+4=10","○"]
]
},
{
id:"same10",
text:"10の位が同じ",
good:true,
rows:[
["33×37","3と3","○"],
["42×48","4と4","○"],
["76×74","7と7","○"]
]
},
{
id:"even",
text:"3つとも偶数どうし",
good:false,
rows:[
["33×37","奇数×奇数","×"],
["42×48","偶数×偶数","○"],
["76×74","偶数×偶数","○"]
]
},
{
id:"sameDiff",
text:"差が全部同じ",
good:false,
rows:[
["33×37","差4","×"],
["42×48","差6","×"],
["76×74","差2","×"]
]
},
{
id:"twodigit",
text:"全部2けた×2けた",
good:false,
rows:[
["33×37","2けた","○"],
["42×48","2けた","○"],
["76×74","2けた","○"]
]
},
{
id:"sum10",
text:"10の位を足すと10",
good:false,
rows:[
["33×37","3+3=6","×"],
["42×48","4+4=8","×"],
["76×74","7+7=14","×"]
]
}
];

const lessons = [
`<div class="step">
33×37 を分けてみよう<br><br>
33 = 30 + 3<br>
37 = 30 + 7
</div>`,

`<div class="step">
30 から矢印を出す<br><br>
30 → 30 = 30×30<br>
30 → 7 = 30×7
</div>

<div class="arrow-grid">
<div class="arrow-card">
30×30 = 900
</div>
<div class="arrow-card">
30×7 = 210
</div>
</div>`,

`<div class="step">
3 からも矢印を出す
</div>

<div class="arrow-grid">
<div class="arrow-card">
3×30 = 90
</div>
<div class="arrow-card">
3×7 = 21
</div>
</div>`,

`<div class="step">
つまり全部で4つ
</div>

<div class="arrow-grid">
<div class="arrow-card">900</div>
<div class="arrow-card">210</div>
<div class="arrow-card">90</div>
<div class="arrow-card">21</div>
</div>`,

`<div class="step">
ここに注目！<br><br>
210 + 90
</div>

<div class="small">
210 = 30が7回<br>
90 = 30が3回
</div>`,

`<div class="step">
つまり<br><br>
30が合計10回
</div>

<div class="step">
30×7 + 3×30<br>
↓<br>
<span class="highlight">30×(7+3)</span><br>
↓<br>
<span class="highlight">30×10</span>
</div>`,

`<div class="step">
最後に全部を足す
</div>

<div class="arrow-grid">
<div class="arrow-card">900</div>
<div class="arrow-card">300</div>
<div class="arrow-card">21</div>
</div>`,

`<div class="step">
答え！<br><br>
33×37 = <span class="highlight">1221</span>
</div>`,

`<div class="step">
42×48 と 76×74 も、<br>
同じようにできるかな？<br><br>
次へを押す前に、<br>
声に出して考えてみよう！
</div>`
];

let selected = new Set();
let step = 0;

const choices = document.getElementById("choices");

data.forEach(d=>{
const b=document.createElement("button");
b.className="choice";
b.textContent=d.text;
b.onclick=()=>{
if(selected.has(d.id)){
selected.delete(d.id);
b.classList.remove("selected");
}else{
selected.add(d.id);
b.classList.add("selected");
}
};
choices.appendChild(b);
});

function check(){
const result=document.getElementById("result");
result.innerHTML="";

data.filter(d=>selected.has(d.id)).forEach(d=>{
let ok=d.rows.every(r=>r[2]=="○");

let html=`<div class="${ok?'good':'bad'}"><b>${d.text}</b><br>`;

d.rows.forEach(r=>{
html+=`${r[0]} → ${r[1]} ${r[2]}<br>`;
});

html+=`</div>`;
result.innerHTML+=html;
});

const good1 = selected.has("ones10");
const good2 = selected.has("same10");

if(good1 && good2){
document.getElementById("nextArea").innerHTML=
'<div style="margin-top:16px"><button onclick="startFlow()">どうして計算が楽になる？</button></div>';
}
}

function startFlow(){
document.getElementById("flow").classList.add("active");
step=0;
renderStep();
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

function renderStep(){
document.getElementById("stepArea").innerHTML=lessons[step];
}

function nextStep(){
step++;
if(step>=lessons.length){
step=lessons.length-1;
return;
}
renderStep();
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}
</script>
</body>
</html>
